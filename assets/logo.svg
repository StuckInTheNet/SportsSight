<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e1a"/>
      <stop offset="100%" style="stop-color:#111927"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="35%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="g1">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Ambient glow behind the mark -->
  <ellipse cx="256" cy="215" rx="100" ry="80" fill="#3b82f6" opacity="0.06" filter="url(#g2)"/>

  <!-- The "S" mark — two interlocking pulse waves forming an abstract S -->
  <g filter="url(#g1)">
    <!-- Upper wave (blue→cyan) -->
    <path d="M136,195 C136,195 170,130 220,155 C270,180 260,115 310,140 C360,165 376,120 376,120"
          fill="none" stroke="url(#accent)" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Lower wave (offset, forms the S) -->
    <path d="M136,260 C136,260 152,310 202,285 C252,260 242,325 292,300 C342,275 376,310 376,310"
          fill="none" stroke="url(#accent)" stroke-width="5.5" stroke-linecap="round"/>
  </g>

  <!-- Connecting vertical strokes (the S spine) -->
  <line x1="220" y1="155" x2="202" y2="285" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
  <line x1="310" y1="140" x2="292" y2="300" stroke="#06b6d4" stroke-width="1.5" opacity="0.15"/>

  <!-- Data nodes at wave peaks -->
  <circle cx="220" cy="155" r="5" fill="#3b82f6"/>
  <circle cx="310" cy="140" r="5" fill="#0ea5e9"/>
  <circle cx="202" cy="285" r="5" fill="#3b82f6"/>
  <circle cx="292" cy="300" r="5" fill="#0ea5e9"/>

  <!-- Center fatigue gauge -->
  <rect x="249" y="185" width="14" height="60" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="249" y="210" width="14" height="35" rx="7" fill="url(#warm)"/>

  <!-- Wordmark -->
  <text x="256" y="410" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="1.5">
    Sport<tspan fill="#3b82f6">Sight</tspan>
  </text>
  <text x="256" y="444" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13.5" font-weight="600" fill="#475569" letter-spacing="5.5">FATIGUE ANALYTICS</text>
</svg>
