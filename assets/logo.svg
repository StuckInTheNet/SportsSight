<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: shield with pulse -->
  <g transform="translate(40, 16)">
    <!-- Shield shape -->
    <path d="M72,8 L132,28 L132,88 C132,128 72,162 72,162 C72,162 12,128 12,88 L12,28 Z"
          fill="#0f172a" stroke="#1e293b" stroke-width="3"/>
    <path d="M72,14 L126,32 L126,86 C126,122 72,154 72,154 C72,154 18,122 18,86 L18,32 Z"
          fill="#0c1222"/>

    <!-- Pulse line inside shield -->
    <g filter="url(#glow)">
      <polyline points="28,82 44,82 54,82 62,58 72,106 82,68 92,92 100,78 116,82"
                fill="none" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Data dots -->
    <circle cx="62" cy="58" r="3" fill="#2563eb"/>
    <circle cx="72" cy="106" r="3" fill="#ef4444"/>
    <circle cx="82" cy="68" r="3" fill="#06b6d4"/>

    <!-- Fatigue bar right edge of shield -->
    <rect x="119" y="42" width="5" height="72" rx="2.5" fill="#1a2332"/>
    <rect x="119" y="70" width="5" height="44" rx="2.5" fill="url(#bar)"/>
  </g>

  <!-- Wordmark -->
  <text x="205" y="105" font-family="'Inter', 'SF Pro Display', -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#f1f5f9" letter-spacing="0">
    <tspan fill="#1e293b">Sport</tspan><tspan fill="url(#accent)">Sight</tspan>
  </text>

  <!-- Tagline -->
  <text x="207" y="140" font-family="'Inter', 'SF Pro Display', -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#64748b" letter-spacing="4">
    REAL-TIME FATIGUE ANALYTICS
  </text>
</svg>
