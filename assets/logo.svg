<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222"/>
      <stop offset="100%" style="stop-color:#162032"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="40%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="pulseGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.4"/>
      <stop offset="40%" style="stop-color:#0ea5e9;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" clip-path="url(#roundClip)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Concentric radar rings -->
  <circle cx="256" cy="220" r="155" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.25"/>
  <circle cx="256" cy="220" r="115" fill="none" stroke="#1e3a5f" stroke-width="0.75" opacity="0.15"/>
  <circle cx="256" cy="220" r="75" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.1"/>

  <!-- Eye shape (surveillance/analytics) — formed by two arcs -->
  <g filter="url(#softGlow)" opacity="0.85">
    <!-- Upper lid -->
    <path d="M100,220 Q256,80 412,220" fill="none" stroke="url(#eyeGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Lower lid -->
    <path d="M100,220 Q256,360 412,220" fill="none" stroke="url(#eyeGrad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Iris ring -->
  <circle cx="256" cy="220" r="52" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.5"/>
  <!-- Pupil -->
  <circle cx="256" cy="220" r="24" fill="#0c1222"/>
  <circle cx="256" cy="220" r="22" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.8"/>
  <!-- Pupil highlight -->
  <circle cx="248" cy="212" r="6" fill="#3b82f6" opacity="0.5"/>
  <circle cx="264" cy="226" r="3" fill="#0ea5e9" opacity="0.3"/>

  <!-- Pulse/heartbeat line cutting through the eye -->
  <g filter="url(#glow)">
    <polyline
      points="65,220 130,220 160,220 185,220 200,180 216,260 232,190 248,240 264,205 280,225 296,215 320,220 360,220 448,220"
      fill="none" stroke="url(#pulseGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Pulse glow shadow -->
  <polyline
    points="65,220 130,220 160,220 185,220 200,180 216,260 232,190 248,240 264,205 280,225 296,215 320,220 360,220 448,220"
    fill="none" stroke="url(#pulseGlow)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small data dots on pulse peaks -->
  <circle cx="200" cy="180" r="3.5" fill="#2563eb" filter="url(#glow)"/>
  <circle cx="216" cy="260" r="3.5" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="232" cy="190" r="3.5" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="248" cy="240" r="3.5" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="264" cy="205" r="3.5" fill="#10b981" filter="url(#glow)"/>

  <!-- Wordmark -->
  <text x="256" y="420" text-anchor="middle" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif" font-size="52" font-weight="700" fill="#f1f5f9" letter-spacing="2">
    Sport<tspan fill="url(#pulseGrad)">Sight</tspan>
  </text>
  <text x="256" y="452" text-anchor="middle" font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif" font-size="15" font-weight="500" fill="#475569" letter-spacing="6">FATIGUE ANALYTICS</text>
</svg>
